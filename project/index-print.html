<style>
  html, body, #root {
    height: 100%; margin: 0;
    font-family: 'Nunito', ui-sans-serif, system-ui, sans-serif;
    background: #FFFCEF; color: #3C3C3C;
    -webkit-font-smoothing: antialiased;
  }
  body { font-feature-settings: "ss01" on, "cv11" on; }

  /* Duo press effect */
  .duo-btn {
    position: relative;
    display: inline-flex; align-items: center; justify-content: center;
    gap: 0.5rem;
    font-weight: 800;
    border-radius: 16px;
    padding: 14px 22px;
    color: #fff;
    background: #58CC02;
    border: 2px solid #58CC02;
    box-shadow: 0 4px 0 0 #46a302;
    transition: transform 80ms ease, box-shadow 80ms ease, background 120ms ease;
    cursor: pointer;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    font-size: 14px;
    user-select: none;
  }
  .duo-btn:hover { background: #61D904; }
  .duo-btn:active { transform: translateY(4px); box-shadow: 0 0 0 0 #46a302; }
  .duo-btn.sm { padding: 10px 16px; font-size: 12px; border-radius: 12px; box-shadow: 0 3px 0 0 #46a302; }
  .duo-btn.sm:active { transform: translateY(3px); box-shadow: 0 0 0 0 #46a302; }
  .duo-btn.lg { padding: 18px 28px; font-size: 16px; box-shadow: 0 6px 0 0 #46a302; }
  .duo-btn.lg:active { transform: translateY(6px); box-shadow: 0 0 0 0 #46a302; }

  .duo-btn.ghost {
    background: #fff; color: #58CC02; border-color: #E5E5E5;
    box-shadow: 0 4px 0 0 #E5E5E5;
  }
  .duo-btn.ghost:hover { background: #FAFAFA; }
  .duo-btn.ghost:active { box-shadow: 0 0 0 0 #E5E5E5; }

  .duo-btn.dark {
    background: #1f4d12; border-color: #1f4d12; box-shadow: 0 4px 0 0 #0e2807;
  }
  .duo-btn.dark:hover { background: #2a6418; }
  .duo-btn.dark:active { box-shadow: 0 0 0 0 #0e2807; }

  .duo-btn.yellow {
    background: #FFC800; border-color: #FFC800; box-shadow: 0 4px 0 0 #D5A500; color: #3C3C3C;
  }
  .duo-btn.yellow:hover { background: #FFD32A; }
  .duo-btn.yellow:active { box-shadow: 0 0 0 0 #D5A500; }

  .duo-card {
    background: #fff;
    border: 2px solid #E5E5E5;
    border-radius: 22px;
    box-shadow: 0 4px 0 0 #E5E5E5;
  }
  .duo-card.tinted {
    background: #FFFCEF;
  }

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: #fff; border: 2px solid #E5E5E5;
    border-radius: 999px; padding: 4px 12px;
    font-size: 12px; font-weight: 700; color: #3C3C3C;
    box-shadow: 0 2px 0 0 #E5E5E5;
  }
  .chip.green { color: #2f6b00; border-color: #B7E893; background: #E8FFD2; box-shadow: 0 2px 0 0 #B7E893; }
  .chip.yellow { color: #8a6900; border-color: #FFE08A; background: #FFF6D6; box-shadow: 0 2px 0 0 #FFE08A; }
  .chip.blue   { color: #0b6ea0; border-color: #A7D8F4; background: #E1F3FF; box-shadow: 0 2px 0 0 #A7D8F4; }

  /* Animations */
  @keyframes floatY { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-12px) } }
  @keyframes floatY2 { 0%,100% { transform: translateY(0) translateX(0) } 50% { transform: translateY(10px) translateX(8px) } }
  @keyframes spinSlow { to { transform: rotate(360deg) } }
  @keyframes pulseGlow {
    0%,100% { opacity: 0.55; transform: scale(1) }
    50% { opacity: 0.95; transform: scale(1.06) }
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(0deg) }
    25% { transform: rotate(3deg) }
    75% { transform: rotate(-3deg) }
  }
  @keyframes drift {
    0% { transform: translate3d(0,0,0) }
    50% { transform: translate3d(20px,-10px,0) }
    100% { transform: translate3d(0,0,0) }
  }
  @keyframes marquee {
    from { transform: translateX(0) }
    to { transform: translateX(-50%) }
  }
  .float-1 { animation: floatY 6.5s ease-in-out infinite; }
  .float-2 { animation: floatY2 9s ease-in-out infinite; }
  .spin-slow { animation: spinSlow 60s linear infinite; }
  .pulse-glow { animation: pulseGlow 5s ease-in-out infinite; }
  .wiggle:hover { animation: wiggle 0.5s ease-in-out; }
  .drift { animation: drift 14s ease-in-out infinite; }
  .marquee-track { animation: marquee 40s linear infinite; }

  /* Reveal */
  .reveal { opacity: 0; transform: translateY(16px); transition: opacity .8s ease, transform .8s ease; }
  .reveal.in { opacity: 1; transform: translateY(0); }

  /* Hero leaf gradient (fallback when video can't load) */
  .leaf-bg {
    background:
      radial-gradient(ellipse 80% 60% at 18% 30%, rgba(215,255,184,0.7), transparent 70%),
      radial-gradient(ellipse 70% 60% at 80% 22%, rgba(88,204,2,0.55), transparent 65%),
      radial-gradient(ellipse 90% 70% at 50% 100%, rgba(31,77,18,0.85), transparent 60%),
      linear-gradient(135deg, #1f4d12 0%, #2f6b00 35%, #46a302 65%, #58CC02 100%);
  }
  .ph-stripes-dark {
    background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.07) 0 8px, rgba(255,255,255,0.02) 8px 16px);
  }

  /* Dotted texture */
  .dot-bg {
    background-image: radial-gradient(circle, #B7E893 1.2px, transparent 1.4px);
    background-size: 22px 22px;
  }

  /* Particle */
  .particle {
    position: absolute; border-radius: 9999px;
    background: rgba(255,255,255,0.6); filter: blur(0.5px);
    animation: floatY 7s ease-in-out infinite;
  }
  .leaf-particle {
    position: absolute; width: 22px; height: 22px;
    color: rgba(255,255,255,0.55);
    animation: drift 14s ease-in-out infinite;
  }

  /* Phone preview */
  .phone {
    position: relative;
    width: 280px; height: 560px;
    background: #1f4d12;
    border-radius: 44px; padding: 10px;
    box-shadow: 0 24px 60px -20px rgba(31,77,18,0.5), 0 10px 0 0 #0e2807;
  }
  .phone-screen {
    width: 100%; height: 100%;
    background: #FFFCEF;
    border-radius: 34px; overflow: hidden;
    position: relative;
  }
  .phone-notch {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 100px; height: 22px; background: #1f4d12; border-radius: 14px; z-index: 2;
  }

  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }

  /* ============== PRINT STYLES ============== */
  @page {
    size: A4 portrait;
    margin: 0;
  }
  @media print {
    html, body, #root {
      background: #FFFCEF !important;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      animation: none !important;
      transition: none !important;
    }
    /* Hide things that don't belong in print */
    nav.fixed, nav[class*="fixed"], .print-hide,
    [aria-label="Open menu"], [aria-label="Close menu"],
    .marquee-track { transform: none !important; }

    /* Drawer + overlays are fixed -- hide */
    div.lg\:hidden.fixed { display: none !important; }

    /* Page break per <section> */
    section {
      break-before: page;
      page-break-before: always;
      break-inside: avoid;
      min-height: 0 !important;
      height: auto !important;
      padding-top: 28px !important;
      padding-bottom: 28px !important;
      overflow: visible !important;
    }
    section:first-of-type {
      break-before: auto;
      page-break-before: avoid;
    }
    main > section, main > footer { width: 100%; }
    footer {
      break-before: page;
      page-break-before: always;
      break-inside: avoid;
      padding-top: 28px !important;
      padding-bottom: 18px !important;
    }

    /* Hero -- size it to a page, keep the bg gradient visible */
    section:first-of-type {
      min-height: auto !important;
      height: auto !important;
      padding-top: 24px !important;
      padding-bottom: 24px !important;
    }
    /* Make any absolute-positioned hero bg behave */
    section .leaf-bg { background-attachment: scroll !important; }

    /* Don't let cards break across pages */
    .duo-card, .duo-btn, .chip, .phone { break-inside: avoid; page-break-inside: avoid; }

    /* Disable sticky/fixed elements that mess with print flow */
    .fixed { position: static !important; }

    /* Tone down massive bg blurs (they bloat PDFs) */
    [style*="filter: blur"] { filter: none !important; }

    /* Replace pure-decorative orbit rings with nothing */
    .spin-slow { display: none !important; }

    /* Hide hero floating mascot to avoid overlap on a static page */
    .float-1, .float-2, .pulse-glow { animation: none !important; }

    /* Slightly shrink huge type so a hero fits a page */
    section:first-of-type h1 { font-size: 56px !important; line-height: 1 !important; }

    /* Ensure the hero readable on print bg */
    section:first-of-type { background: #1f4d12 !important; color: #fff !important; }
    section:first-of-type .leaf-bg { display: block !important; }
    section:first-of-type video, section:first-of-type canvas { display: none !important; }

    /* Marquee: hide duplicated tail */
    .marquee-track > *:nth-child(n+7) { display: none !important; }
  }
</style>
</head>

/* ---------- Boomerang Video Bg (with gradient + leaf-particle fallback) ---------- */
const BG_VIDEO = "https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260511_131941_d136af49-e243-493a-be14-6ff3f24e09e6.mp4";

function BoomerangVideoBg({ src, className }) {
  const videoRef = useRef(null);
  const displayCanvasRef = useRef(null);
  const [framesReady, setFramesReady] = useState(false);
  const [fallback, setFallback] = useState(false);
  const framesRef = useRef([]);

  useEffect(() => {
    const video = videoRef.current;
    if (!video) return;
    const frames = [];
    let capturing = true;
    let lastTime = -1;
    const MAX_WIDTH = 960;

    const captureFrame = () => {
      if (!capturing || video.readyState < 2) return;
      if (video.currentTime === lastTime) return;
      lastTime = video.currentTime;
      const vw = video.videoWidth, vh = video.videoHeight;
      if (!vw || !vh) return;
      const scale = Math.min(1, MAX_WIDTH / vw);
      const w = Math.round(vw * scale), h = Math.round(vh * scale);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      if (!ctx) return;
      try { ctx.drawImage(video, 0, 0, w, h); frames.push(canvas); }
      catch(e) { capturing = false; setFallback(true); }
    };

    const hasVFC = typeof video.requestVideoFrameCallback === "function";
    let rafId = 0;
    const rafLoop = () => { captureFrame(); if (capturing) rafId = requestAnimationFrame(rafLoop); };
    const vfcLoop = () => { captureFrame(); if (capturing && video.requestVideoFrameCallback) video.requestVideoFrameCallback(vfcLoop); };
    const onEnded = () => { capturing = false; if (frames.length) { framesRef.current = frames; setFramesReady(true); } };
    const onError = () => setFallback(true);
    const onLoaded = () => {
      video.play().catch(() => setFallback(true));
      if (hasVFC) video.requestVideoFrameCallback(vfcLoop); else rafId = requestAnimationFrame(rafLoop);
    };
    const timeout = setTimeout(() => { if (!framesReady && video.readyState < 2) setFallback(true); }, 4500);

    video.addEventListener("loadedmetadata", onLoaded);
    video.addEventListener("ended", onEnded);
    video.addEventListener("error", onError);
    if (video.readyState >= 1) onLoaded();
    return () => {
      capturing = false;
      cancelAnimationFrame(rafId); clearTimeout(timeout);
      video.removeEventListener("loadedmetadata", onLoaded);
      video.removeEventListener("ended", onEnded);
      video.removeEventListener("error", onError);
    };
  }, [src]);

  useEffect(() => {
    if (!framesReady) return;
    const canvas = displayCanvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d"); if (!ctx) return;
    const frames = framesRef.current; if (!frames.length) return;
    const first = frames[0]; canvas.width = first.width; canvas.height = first.height;
    let index = 0, direction = 1, last = performance.now();
    const interval = 1000 / 30;
    let rafId = 0;
    const render = (now) => {
      if (now - last >= interval) {
        last = now; ctx.drawImage(frames[index], 0, 0);
        index += direction;
        if (index >= frames.length - 1) { index = frames.length - 1; direction = -1; }
        else if (index <= 0) { index = 0; direction = 1; }
      }
      rafId = requestAnimationFrame(render);
    };
    rafId = requestAnimationFrame(render);
    return () => cancelAnimationFrame(rafId);
  }, [framesReady]);

  return (
    <div className={className ?? "absolute inset-0 w-full h-full"}>
      <div className={`absolute inset-0 leaf-bg ${fallback || !framesReady ? "block" : "hidden"}`}>
        <div className="absolute -left-24 top-24 w-[420px] h-[420px] rounded-full pulse-glow"
          style={{ background: "radial-gradient(circle, rgba(215,255,184,0.6), transparent 65%)", filter: "blur(40px)" }} />
        <div className="absolute right-[-80px] top-1/3 w-[520px] h-[520px] rounded-full float-1"
          style={{ background: "radial-gradient(circle, rgba(88,204,2,0.55), transparent 65%)", filter: "blur(50px)" }} />
        <div className="absolute left-1/3 bottom-[-100px] w-[600px] h-[600px] rounded-full float-2"
          style={{ background: "radial-gradient(circle, rgba(31,77,18,0.7), transparent 70%)", filter: "blur(60px)" }} />
        {[...Array(18)].map((_, i) => (
          <span key={i} className="particle" style={{
            width: `${4 + (i % 5)}px`, height: `${4 + (i % 5)}px`,
            left: `${(i * 47) % 100}%`, top: `${(i * 73) % 100}%`,
            animationDelay: `${(i % 9) * 0.6}s`,
            animationDuration: `${6 + (i % 5)}s`,
            opacity: 0.3 + (i % 5) * 0.1,
          }} />
        ))}
        {/* floating leaves */}
        {[...Array(8)].map((_, i) => (
          <span key={`l${i}`} className="leaf-particle" style={{
            left: `${(i * 31 + 5) % 90}%`, top: `${(i * 19 + 12) % 80}%`,
            animationDelay: `${i * 0.8}s`, animationDuration: `${12 + i}s`,
            transform: `rotate(${i * 45}deg)`,
          }}>
            <svg viewBox="0 0 24 24" fill="currentColor" className="w-full h-full">
              <path d="M17 4c0 8-4 12-9 12 0 0-1-7 4-11 0 0 5-1 5-1zM6 20c0-4 3-6 6-7" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
            </svg>
          </span>
        ))}
      </div>
      <video ref={videoRef} src={src}
        className="w-full h-full object-cover"
        style={{ display: framesReady && !fallback ? "block" : "none" }}
        muted playsInline preload="auto" crossOrigin="anonymous" autoPlay />
      <canvas ref={displayCanvasRef}
        className="w-full h-full object-cover absolute inset-0"
        style={{ display: framesReady && !fallback ? "block" : "none" }} />
      <div className="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-[#1f4d12]/60" />
    </div>
  );
}

/* ---------- Reveal hook ---------- */
function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting) el.classList.add("in"); }), { threshold: 0.12 });
    io.observe(el); return () => io.disconnect();
  }, []);
  return ref;
}

// Auto-print after React mounts, fonts loaded, and a brief settle delay.
(async () => {
  try {
    if (document.fonts && document.fonts.ready) {
      await document.fonts.ready;
    }
  } catch (e) {}
  // Wait until React has mounted some content
  await new Promise((res) => {
    const start = Date.now();
    const check = () => {
      const root = document.getElementById("root");
      if (root && root.childElementCount > 0) return res();
      if (Date.now() - start > 5000) return res();
      requestAnimationFrame(check);
    };
    check();
  });
  // Force the leaf-bg fallback to show on the hero (video may not load before print)
  document.querySelectorAll("section video, section canvas").forEach(el => el.style.display = "none");
  document.querySelectorAll("section .leaf-bg").forEach(el => { el.classList.remove("hidden"); el.style.display = "block"; });
  // Extra settle delay to be safe
  await new Promise(r => setTimeout(r, 700));
  window.print();
})();
</script>
